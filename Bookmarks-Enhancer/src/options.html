<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <style>
        label {
            display: block;
        }

        label {
            font-weight: bold;
        }

        .formControl {
            margin-bottom: 2em;
            width: 80%;
        }

        .formControl > * {
            width: 100%;
        }

        #statusToast {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            max-width: 24rem;
            padding: 0.75rem 1rem;
            color: white;
            background: #1f6f43;
            border-radius: 0.375rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(0.5rem);
            transition: opacity 150ms ease, transform 150ms ease;
            pointer-events: none;
        }

        #statusToast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #statusToast.error {
            background: #9f1d1d;
        }
    </style>
</head>
<body>
    <form>
        <label>Enable Top Border</label>
        <input type="checkbox" id="enableTopBorder">
        <label>Enable Deep Search</label>
        <input type="checkbox" id="enableDeepSearch">
        <label>Only Use Specified Sites</label>
        <input type="checkbox" id="onlyUseSites">

        <h3>Bookmark Folders</h3>
        <p>Bookmarks in these folders (including nested folders) control blocked and favorited styling.</p>
        <label for="blockedFolderId">Blocked folder</label>
        <select id="blockedFolderId" class="formControl"></select>
        <label for="favoritedFolderId">Favorited folder</label>
        <select id="favoritedFolderId" class="formControl"></select>

        <h3>Search Pairs</h3>
        <table id="searchTable">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Classes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
        <button type="button" id="addRowBtn">Add Row</button>

        <h3>URL Parameter Rules</h3>

        <table id="urlRuleTable">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Parameters To Keep</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="urlRuleBody">
            </tbody>
        </table>
        <button type="button" id="addUrlRuleBtn">Add URL Rule</button>
        <h3>Block Text</h3>
        <table id="textFilterTable">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Filter Text</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="textFilterBody">
            </tbody>
        </table>
        <button type="button" id="addTextFilterBtn">Add Text Filter</button>
        <div>
            <button type="button" id="exportBtn">Export to Clipboard</button>
            <button type="button" id="importBtn">Import from Clipboard</button>
            <button type="submit">Save</button>
        </div>
    </form>

    <div id="statusToast" role="status" aria-live="polite"></div>
    <script src="utils.js"></script>
    <script src="options.js"></script>
</body>
</html>
