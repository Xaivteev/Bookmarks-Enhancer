<!DOCTYPE html>

<html>
<head>
    <meta charset="utf-8">
    <style>
        label {
            display: block;
        }

        label {
            font-weight: bold;
        }

        .formControl {
            margin-bottom: 2em;
            width: 80%;
        }

        .formControl > * {
            width: 100%;
        }

        #statusToast {
            position: fixed;
            right: 1rem;
            bottom: 1rem;
            max-width: 24rem;
            padding: 0.75rem 1rem;
            color: white;
            background: #1f6f43;
            border-radius: 0.375rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(0.5rem);
            transition: opacity 150ms ease, transform 150ms ease;
            pointer-events: none;
        }

        #statusToast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #statusToast.error {
            background: #9f1d1d;
        }
    </style>
</head>
<body>
    <form>
        <label>Enable Top Border</label>
        <input type="checkbox" id="enableTopBorder">
        <label>Only Use Specified Sites</label>
        <input type="checkbox" id="onlyUseSites">
        <label>Sites and Tags for Search</label>
        <table id="searchTable">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>Tag</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Rows will be added dynamically -->
            </tbody>
        </table>
        <button type="button" id="addRowBtn">Add Row</button>
        <button type="button" id="exportBtn">Export to Clipboard</button>
        <button type="button" id="importBtn">Import from Clipboard</button>
        <button type="submit">Save</button>
    </form>
    <div id="statusToast" role="status" aria-live="polite"></div>
    <script src="options.js"></script>
</body>
</html>
